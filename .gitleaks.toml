title = "Custom Gitleaks config (minimal)"

[allowlist]
description = "Allow common GitHub Actions references and bot emails; all other findings are scanned normally."

# Limit allowlist to workflow files only
paths = [
  '''\.github/workflows/.*\.ya?ml'''
]

# Patterns that are not considered secrets in this repository
regexes = [
  # GitHub Actions token reference (not a real secret value)
  '''\$\{\{\s*secrets\.GITHUB_TOKEN\s*\}\}''',

  # GitHub Actions bot noreply email
  '''github-actions\[bot\]@users\.noreply\.github\.com'''
]