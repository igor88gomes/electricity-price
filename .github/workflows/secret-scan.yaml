name: Secret Scan (gitleaks)

on:
  pull_request:
  push:
    branches:
      - main          # Run Gitleaks on push only to main, otherwise only on pull requests

permissions:
  contents: read
  pull-requests: read         # Required for PR diffs
  security-events: write      # Required for SARIF upload

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Gitleaks
        run: |
          set -e
          VERSION="8.24.0"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz
          sudo mv gitleaks /usr/local/bin/

      - name: Run Gitleaks scan
        run: |
          gitleaks detect \
            --source . \
            --redact \
            -c .gitleaks.toml \
            --report-format sarif \
            --report-path gitleaks-results.sarif

      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks-results.sarif
