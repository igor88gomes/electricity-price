name: Release PROD (SemVer + GitOps Dispatch)

on:
  push:
    tags:
      - 'v*.*.*'   # SemVer tags

env:
  IMAGE_REPO: ghcr.io/igor88gomes/electricity-price
  GITOPS_REPO: igor88gomes/electricity-price-gitops

permissions:
  contents: read
  actions: write
  packages: write

jobs:
  build-publish-prod:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get version from tag
        id: meta
        run: echo "REL_TAG=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      # Reuses the current release-candidate manifest for PROD
      - name: Promote release candidate as PROD release
        id: build
        shell: bash
        run: |
          REL_TAG="${{ steps.meta.outputs.REL_TAG }}"
          CANDIDATE_TAG="release-candidate"

          echo "Using RELEASE_CANDIDATE=${IMAGE_REPO}:${CANDIDATE_TAG}"
          echo "Using REL_TAG=${REL_TAG}"

          docker buildx imagetools create \
            --tag "${IMAGE_REPO}:${REL_TAG}" \
            "${IMAGE_REPO}:${CANDIDATE_TAG}"

          DIGEST=$(docker buildx imagetools inspect "${IMAGE_REPO}:${REL_TAG}" | sed -n 's/^Digest: //p' | head -n1)

          if [[ -z "${DIGEST}" ]]; then
            echo "ERROR: could not retrieve manifest digest for ${IMAGE_REPO}:${REL_TAG}"
            exit 1
          fi

          echo "Resolved manifest digest (same as release-candidate): ${DIGEST}"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Expose image digest
        run: |
          echo "IMAGE_DIGEST=${{ steps.build.outputs.digest }}"
          printf "%s" "${{ steps.build.outputs.digest }}" > image-digest.txt
          {
            echo "## PROD Build Summary"
            echo ""
            echo "- Version: \`${{ steps.meta.outputs.REL_TAG }}\`"
            echo "- Digest:  \`${{ steps.build.outputs.digest }}\`"
          } >> $GITHUB_STEP_SUMMARY

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-digest
          path: image-digest.txt
          retention-days: 7

      - name: Dispatch release-prod event to GitOps
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.GH_PAT }}
          repository: ${{ env.GITOPS_REPO }}
          event-type: release-prod
          client-payload: >-
            {
              "version": "${{ steps.meta.outputs.REL_TAG }}",
              "digest": "${{ steps.build.outputs.digest }}"
            }

      - name: Info
        run: |
          echo "Sent release-prod event to GitOps:"
          echo "  Version: ${{ steps.meta.outputs.REL_TAG }}"
          echo "  Digest:  ${{ steps.build.outputs.digest }}"
          echo "  Source:  ${IMAGE_REPO}:release-candidate"
