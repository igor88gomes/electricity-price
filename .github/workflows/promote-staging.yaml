name: Promote to STAGING (GitOps Dispatch)

on:
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA used for traceability and fallback DEV image lookup"
        required: true
        type: string
      tag:
        description: "DEV image tag to promote, for example dev-abcdef1"
        required: false
        type: string
      digest:
        description: "Immutable image digest to promote to STAGING"
        required: false
        type: string

env:
  IMAGE_REPO: ghcr.io/igor88gomes/electricity-price
  GITOPS_REPO: igor88gomes/electricity-price-gitops

permissions:
  contents: read
  actions: write
  packages: read

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Normalize promotion metadata
        id: meta
        shell: bash
        run: |
          SHORT_SHA="${{ inputs.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"

          if [[ -n "${{ inputs.tag }}" ]]; then
            PROMOTION_TAG="${{ inputs.tag }}"
          else
            PROMOTION_TAG="dev-${SHORT_SHA}"
          fi

          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "PROMOTION_TAG=${PROMOTION_TAG}" >> "$GITHUB_OUTPUT"

          echo "Using SHORT_SHA=${SHORT_SHA}"
          echo "Using PROMOTION_TAG=${PROMOTION_TAG}"

      - name: Resolve digest from DEV image when not provided
        id: resolved_digest
        shell: bash
        run: |
          if [[ -n "${{ inputs.digest }}" ]]; then
            DIGEST="${{ inputs.digest }}"
            echo "Using provided digest: ${DIGEST}"
          else
            DEV_TAG="${{ steps.meta.outputs.PROMOTION_TAG }}"
            echo "No digest provided. Resolving digest from ${IMAGE_REPO}:${DEV_TAG}"

            docker pull "${IMAGE_REPO}:${DEV_TAG}"

            DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${IMAGE_REPO}:${DEV_TAG}" | cut -d'@' -f2)
            if [[ -z "${DIGEST}" ]]; then
              echo "ERROR: could not retrieve digest for ${IMAGE_REPO}:${DEV_TAG}"
              exit 1
            fi

            echo "Resolved digest: ${DIGEST}"
          fi

          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Dispatch promote-staging event to GitOps
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.GH_PAT }}
          repository: ${{ env.GITOPS_REPO }}
          event-type: promote-staging
          client-payload: >-
            {
              "sha": "${{ steps.meta.outputs.SHORT_SHA }}",
              "tag": "${{ steps.meta.outputs.PROMOTION_TAG }}",
              "digest": "${{ steps.resolved_digest.outputs.digest }}"
            }

      - name: Info
        run: |
          echo "Sent promote-staging event to GitOps:"
          echo "  SHA:    ${{ steps.meta.outputs.SHORT_SHA }}"
          echo "  Tag:    ${{ steps.meta.outputs.PROMOTION_TAG }}"
          echo "  Digest: ${{ steps.resolved_digest.outputs.digest }}"